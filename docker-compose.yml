# =============================================================================
# Docker Compose - Network Security Lab (Microservices Architecture)
# Man-in-the-Middle (MITM) & ARP Spoofing Attack Demonstration
# =============================================================================
# Architecture:
#   Docker Bridge (lab-network: 172.20.0.0/24) — Layer 2 broadcast domain
#
#   ┌── Microservices ──────────────────────────────────────────────────┐
#   │                                                                   │
#   │  DATABASE (Shared)                                                │
#   │    └── database       172.20.0.50  (MongoDB — shared instance)    │
#   │         ├── vulnerable_db  → passwords stored PLAINTEXT           │
#   │         └── secure_db      → passwords stored BCRYPT HASH         │
#   │                                                                   │
#   │  VULNERABLE STACK (HTTP — No Encryption)                          │
#   │    ├── vuln-frontend  172.20.0.20  (React — port 3000)            │
#   │    └── vuln-backend   172.20.0.21  (Express HTTP — port 5000)     │
#   │         └── connects to database:27017/vulnerable_db              │
#   │                                                                   │
#   │  SECURE STACK (HTTPS — TLS Encrypted)                             │
#   │    ├── sec-frontend   172.20.0.30  (React — port 3443)            │
#   │    └── sec-backend    172.20.0.31  (Express HTTPS — port 5443)    │
#   │         └── connects to database:27017/secure_db                  │
#   │                                                                   │
#   │  ATTACKER                                                         │
#   │    └── attacker       172.20.0.100 (Kali Linux + attack tools)    │
#   │                                                                   │
#   │  CLIENT VICTIM                                                    │
#   │    └── client-victim  172.20.0.10  (webtop XFCE desktop)          │
#   │                                                                   │
#   │  MANAGEMENT                                                       │
#   │    └── ts-secure      (shared)     (Tailscale VPN — SSH/DB)       │
#   └───────────────────────────────────────────────────────────────────┘
#
# MITRE ATT&CK: T1557.002 (ARP Cache Poisoning), T1040 (Network Sniffing)
# =============================================================================

services:
  # ===========================================================================
  # DATABASE (MongoDB — Shared by Both Apps)
  # ===========================================================================
  # Satu instance MongoDB dengan 2 database:
  #   - vulnerable_db: password PLAINTEXT (demonstrasi OWASP A04:2025)
  #   - secure_db:     password BCRYPT HASH (solusi keamanan)
  #
  # Ini mendemonstrasikan bahwa keamanan data bukan hanya soal infrastruktur
  # database yang sama, tetapi bagaimana APLIKASI memperlakukan data sensitif.
  # ===========================================================================
  database:
    image: mongo:7
    container_name: database
    hostname: database
    volumes:
      - mongodb_data:/data/db
      - ./database/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      - MONGO_INITDB_DATABASE=vulnerable_db
    restart: unless-stopped
    networks:
      lab-network:
        ipv4_address: 172.20.0.50

  # ===========================================================================
  # ATTACKER (Kali Linux + Custom Tools)
  # ===========================================================================
  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: attacker
    hostname: attacker
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./attack-scripts:/opt/attack-scripts
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - database
    networks:
      lab-network:
        ipv4_address: 172.20.0.100

  # ===========================================================================
  # CLIENT VICTIM (Desktop GUI — Target of MITM Attack)
  # Akses GUI: http://localhost:3080
  # ===========================================================================
  client-victim:
    image: linuxserver/webtop:alpine-xfce
    container_name: client-victim
    hostname: client-victim
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
    ports:
      - "3080:3000"
    shm_size: "1gb"
    restart: unless-stopped
    depends_on:
      - vulnerable-frontend
      - secure-frontend
    networks:
      lab-network:
        ipv4_address: 172.20.0.10

  # ===========================================================================
  # VULNERABLE STACK (HTTP — No Encryption)
  # Frontend: React (port 3000) → Backend: Express HTTP (port 5000) → MongoDB
  # ===========================================================================
  vulnerable-frontend:
    build:
      context: ./vulnerable-app/frontend
      dockerfile: Dockerfile
    container_name: vuln-frontend
    hostname: vulnerable-app
    environment:
      - REACT_APP_API_URL=http://vulnerable-app:5000
    depends_on:
      - vulnerable-backend
    restart: unless-stopped
    networks:
      lab-network:
        ipv4_address: 172.20.0.20

  vulnerable-backend:
    build:
      context: ./vulnerable-app/backend
      dockerfile: Dockerfile
    container_name: vuln-backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/vulnerable_db
    depends_on:
      - database
    restart: unless-stopped
    networks:
      lab-network:
        ipv4_address: 172.20.0.21

  # ===========================================================================
  # SECURE STACK (HTTPS — TLS Encrypted)
  # Frontend: React (port 3443) → Backend: Express HTTPS (port 5443) → MongoDB
  # ===========================================================================
  secure-frontend:
    build:
      context: ./secure-app/frontend
      dockerfile: Dockerfile
    container_name: sec-frontend
    hostname: secure-app
    environment:
      - REACT_APP_API_URL=https://secure-app:5443
    depends_on:
      - secure-backend
    restart: unless-stopped
    networks:
      lab-network:
        ipv4_address: 172.20.0.30

  secure-backend:
    build:
      context: ./secure-app/backend
      dockerfile: Dockerfile
    container_name: sec-backend
    environment:
      - NODE_ENV=production
      - PORT=5443
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      - ALLOWED_ORIGIN=https://secure-app:3443
      - MONGO_URI=mongodb://database:27017/secure_db
    depends_on:
      - database
    restart: unless-stopped
    networks:
      lab-network:
        ipv4_address: 172.20.0.31

  # ===========================================================================
  # TAILSCALE VPN — Secure Management Plane (SSH & DB Access)
  # Demonstrasi: akses management server via WireGuard tunnel,
  # sehingga tidak terekspos di bridge network yang rentan ARP Spoofing.
  # ===========================================================================
  tailscale-secure:
    image: tailscale/tailscale:latest
    container_name: ts-secure
    hostname: secure-mgmt
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:secure
    volumes:
      - ./tailscale/secure/state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    network_mode: service:secure-backend
    depends_on:
      - secure-backend
    restart: unless-stopped

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  mongodb_data:
    driver: local

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  lab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
